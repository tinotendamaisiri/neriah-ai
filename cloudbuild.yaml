# Cloud Build pipeline for the Neriah backend (Cloud Functions Gen2).
#
# Idempotent contract: this file lists EVERY env var and EVERY secret
# binding the running service needs. Every successful build re-asserts
# the full container config; nothing implicit, nothing dropped.
#
# Plain config goes through --set-env-vars (KEY=VALUE pairs separated by
# commas — none of our values contain commas). Credentials live in
# Secret Manager and are bound via --set-secrets so the env var is
# resolved at container start by neriah-ai-sa, which has project-wide
# `roles/secretmanager.secretAccessor`.
#
# Why --set-env-vars (not --update-env-vars):
#   --set-env-vars replaces the full env map atomically; --update only
#   merges. If an env var is removed from this file we WANT it removed
#   from the deployed service. Listing everything here makes the file
#   the single source of truth, and grep'ing for a name reliably tells
#   you whether prod ships with it.
#
# To verify after deploy:
#   gcloud run services describe neriah-grading --region=us-central1 \
#     --project=neriah-ai-492302 --format=yaml | yq '.spec.template.spec.containers[0].env'

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - neriah-grading
      - --gen2
      - --runtime=python311
      - --region=us-central1
      - --source=.
      - --entry-point=neriah
      - --trigger-http
      - --allow-unauthenticated
      - --memory=1Gi
      - --timeout=300s
      - --max-instances=3
      - --concurrency=1
      # Pin the runtime SA so deploys never drift back to the Compute
      # Engine default. Required roles: aiplatform.user,
      # aiplatform.endpointUser, datastore.user, storage.objectAdmin,
      # secretmanager.secretAccessor, cloudfunctions.developer,
      # serviceusage.serviceUsageConsumer.
      - --service-account=neriah-ai-sa@$PROJECT_ID.iam.gserviceaccount.com

      # ── Plain env (non-secret config + public IDs) ──────────────────
      # Comma-separated KEY=VALUE pairs. None of our values contain
      # commas so the default delimiter is safe. If you need to add a
      # value with a comma, switch to the custom-delimiter form
      # (^@^KEY=VAL@KEY=VAL).
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=us-central1,ENVIRONMENT=production,LOG_EXECUTION_ID=true,INFERENCE_BACKEND=vertex,GCS_BUCKET_SCANS=neriah-scans,GCS_BUCKET_MARKED=neriah-marked,GCS_BUCKET_SUBMISSIONS=neriah-submissions,ALLOW_BYPASS=true,DEV_BYPASS_COUNTRY=+263,DEV_BYPASS_PHONES=+263779929952,RESEND_FROM_ADDRESS=mark@send.neriah.ai,TWILIO_PHONE_NUMBER=+15186083556,SUPABASE_URL=https://pxhwfuhflthnakqyotdx.supabase.co,UPSTASH_REDIS_REST_URL=https://valid-lamb-102065.upstash.io

      # ── Secret-backed env (Secret Manager → env var at container start) ──
      # Each KEY=SECRET_NAME:VERSION pair. `latest` always picks up
      # the newest version on next deploy; pin a specific version
      # (e.g. APP_JWT_SECRET=APP_JWT_SECRET:3) if you ever need rollback
      # protection.
      #
      # Twilio SIDs and the Supabase anon key are technically public-by-
      # design identifiers, but GitHub's secret scanner flags them in
      # plaintext repo files — keeping them in Secret Manager keeps the
      # YAML scanner-clean and lets us rotate without touching CI.
      - --set-secrets=APP_JWT_SECRET=APP_JWT_SECRET:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_VERIFY_SID=TWILIO_VERIFY_SID:latest,WHATSAPP_PHONE_NUMBER_ID=WHATSAPP_PHONE_NUMBER_ID:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,KEEP_ALIVE_SECRET=KEEP_ALIVE_SECRET:latest,UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest,ADMIN_API_KEY=ADMIN_API_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest,WHATSAPP_ACCESS_TOKEN=WHATSAPP_ACCESS_TOKEN:latest,WHATSAPP_APP_SECRET=WHATSAPP_APP_SECRET:latest,WHATSAPP_VERIFY_TOKEN=WHATSAPP_VERIFY_TOKEN:latest

options:
  logging: CLOUD_LOGGING_ONLY
