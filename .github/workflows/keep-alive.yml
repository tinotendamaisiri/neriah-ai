name: Keep Services Alive

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
    - cron: '0 9 * * 4'  # Every Thursday at 9am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping neriah.ai
        id: ping_home
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://neriah.ai)
          echo "https://neriah.ai -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Ping neriah.ai/blog
        id: ping_blog
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://neriah.ai/blog)
          echo "https://neriah.ai/blog -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Ping neriah.ai/pricing
        id: ping_pricing
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://neriah.ai/pricing)
          echo "https://neriah.ai/pricing -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Ping neriah.ai/demo
        id: ping_demo
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://neriah.ai/demo)
          echo "https://neriah.ai/demo -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Ping Supabase REST
        id: ping_supabase
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pxhwfuhflthnakqyotdx.supabase.co/rest/v1/)
          echo "https://pxhwfuhflthnakqyotdx.supabase.co/rest/v1/ -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Ping Upstash Redis
        id: ping_upstash
        continue-on-error: true
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$UPSTASH_REDIS_REST_URL" ] || [ -z "$UPSTASH_REDIS_REST_TOKEN" ]; then
            echo "Upstash secrets not configured — skipping."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$UPSTASH_REDIS_REST_URL/set/keepalive/1" \
            -H "Authorization: Bearer $UPSTASH_REDIS_REST_TOKEN")
          echo "Upstash ping: $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "=== Keep-alive ping summary ==="
          echo "https://neriah.ai                                  -> ${{ steps.ping_home.outputs.status }}"
          echo "https://neriah.ai/blog                             -> ${{ steps.ping_blog.outputs.status }}"
          echo "https://neriah.ai/pricing                          -> ${{ steps.ping_pricing.outputs.status }}"
          echo "https://neriah.ai/demo                             -> ${{ steps.ping_demo.outputs.status }}"
          echo "https://pxhwfuhflthnakqyotdx.supabase.co/rest/v1/  -> ${{ steps.ping_supabase.outputs.status }}"
          echo "Upstash Redis (SET keepalive=1)                    -> ${{ steps.ping_upstash.outputs.status }}"
          {
            echo "## Keep-alive ping summary"
            echo ""
            echo "| Target | Status |"
            echo "| --- | --- |"
            echo "| https://neriah.ai | ${{ steps.ping_home.outputs.status }} |"
            echo "| https://neriah.ai/blog | ${{ steps.ping_blog.outputs.status }} |"
            echo "| https://neriah.ai/pricing | ${{ steps.ping_pricing.outputs.status }} |"
            echo "| https://neriah.ai/demo | ${{ steps.ping_demo.outputs.status }} |"
            echo "| https://pxhwfuhflthnakqyotdx.supabase.co/rest/v1/ | ${{ steps.ping_supabase.outputs.status }} |"
            echo "| Upstash Redis (SET keepalive=1) | ${{ steps.ping_upstash.outputs.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"
