name: Keep Services Alive

# Runs daily — Supabase free-tier auto-pauses after 7 days of inactivity
# and the previous biweekly schedule combined with a no-auth REST ping
# left the project flagged as inactive. Daily authenticated query on a
# real table is what Supabase counts as "active".
on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping neriah.ai
        id: ping_home
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://neriah.ai)
          echo "https://neriah.ai -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Ping neriah.ai/blog
        id: ping_blog
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://neriah.ai/blog)
          echo "https://neriah.ai/blog -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Ping neriah.ai/pricing
        id: ping_pricing
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://neriah.ai/pricing)
          echo "https://neriah.ai/pricing -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Ping neriah.ai/demo
        id: ping_demo
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://neriah.ai/demo)
          echo "https://neriah.ai/demo -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Ping Supabase (real DB query)
        id: ping_supabase
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Supabase auto-pauses on 7 days of zero database activity.
          # An unauthenticated GET on /rest/v1/ does NOT count — the project
          # was getting paused because previous pings only hit the REST root.
          # Issue an authenticated SELECT against a real table, which is what
          # Supabase tracks as activity.
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_URL or SUPABASE_ANON_KEY secret missing — falling back to root ping (won't prevent pause)."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pxhwfuhflthnakqyotdx.supabase.co/rest/v1/)
            echo "status=$STATUS (root only — set secrets to do real query)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Hit a small/empty table with an explicit ?limit=1. We use
          # contact_submissions because it's known to exist; if you rename
          # it, update the path here.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/contact_submissions?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase SELECT contact_submissions -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Ping Upstash Redis
        id: ping_upstash
        continue-on-error: true
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$UPSTASH_REDIS_REST_URL" ] || [ -z "$UPSTASH_REDIS_REST_TOKEN" ]; then
            echo "Upstash secrets not configured — skipping."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$UPSTASH_REDIS_REST_URL/set/keepalive/1" \
            -H "Authorization: Bearer $UPSTASH_REDIS_REST_TOKEN")
          echo "Upstash ping: $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "=== Keep-alive ping summary ==="
          echo "https://neriah.ai                                  -> ${{ steps.ping_home.outputs.status }}"
          echo "https://neriah.ai/blog                             -> ${{ steps.ping_blog.outputs.status }}"
          echo "https://neriah.ai/pricing                          -> ${{ steps.ping_pricing.outputs.status }}"
          echo "https://neriah.ai/demo                             -> ${{ steps.ping_demo.outputs.status }}"
          echo "https://pxhwfuhflthnakqyotdx.supabase.co/rest/v1/  -> ${{ steps.ping_supabase.outputs.status }}"
          echo "Upstash Redis (SET keepalive=1)                    -> ${{ steps.ping_upstash.outputs.status }}"
          {
            echo "## Keep-alive ping summary"
            echo ""
            echo "| Target | Status |"
            echo "| --- | --- |"
            echo "| https://neriah.ai | ${{ steps.ping_home.outputs.status }} |"
            echo "| https://neriah.ai/blog | ${{ steps.ping_blog.outputs.status }} |"
            echo "| https://neriah.ai/pricing | ${{ steps.ping_pricing.outputs.status }} |"
            echo "| https://neriah.ai/demo | ${{ steps.ping_demo.outputs.status }} |"
            echo "| https://pxhwfuhflthnakqyotdx.supabase.co/rest/v1/ | ${{ steps.ping_supabase.outputs.status }} |"
            echo "| Upstash Redis (SET keepalive=1) | ${{ steps.ping_upstash.outputs.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"
